<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>جاهز للأزمات والطوارئ؟</title>
  <style>
    body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#071420;color:#eaf4ff;padding:20px}
    .q{padding:12px;border:1px solid rgba(255,255,255,.15);border-radius:14px;margin:10px 0;background:rgba(255,255,255,.06)}
    select{width:100%;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.25);color:#eaf4ff}
  </style>
</head>
<body>
  <h2>اختبار ظهور الأسئلة</h2>
  <div id="questions"></div>

  <script>
    const questions = [
      "هل لديكم خطة طوارئ مكتوبة؟",
      "هل يعرف الجميع أدوارهم؟",
      "هل لديكم نقطة تجمع؟",
      "هل أرقام الطوارئ محفوظة؟",
      "هل لديكم تواصل بديل؟",
      "هل حقيبة 72 ساعة جاهزة؟",
      "هل إسعافات أولية مكتملة؟",
      "هل كاشف الدخان يعمل؟",
      "هل طفاية الحريق صالحة؟",
      "هل تعرفون فصل الغاز والكهرباء؟"
    ];

    const options = [
      {v:0,t:"غير متوفر"},
      {v:1,t:"ضعيف"},
      {v:2,t:"متوسط"},
      {v:3,t:"جيد"},
      {v:4,t:"ممتاز"}
    ];

    const container = document.getElementById("questions");
    container.innerHTML = "";

    questions.forEach((q, idx) => {
      const box = document.createElement("div");
      box.className = "q";
      box.innerHTML = `
        <div style="font-weight:800;margin-bottom:8px">${idx+1}. ${q}</div>
        <select>
          <option value="" selected disabled>— اختر —</option>
          ${options.map(o=>`<option value="${o.v}">${o.t}</option>`).join("")}
        </select>
      `;
      container.appendChild(box);
    });
  </script>
</body>
</html>
