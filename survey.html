<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استبيان جاهزية الاستعداد للطوارئ السكنية</title>

<style>
body{
    font-family: Tahoma, sans-serif;
    margin:0;
    background:#f4f7fa;
}

.container{
    max-width:800px;
    margin:50px auto;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

h1{
    text-align:center;
    color:#1e73be;
}

.question{
    margin-top:30px;
}

button{
    background:#1e73be;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:30px;
}

.result{
    margin-top:30px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>استبيان جاهزية المنزل للطوارئ</h1>

<div class="question">
<p>هل لديك خطة طوارئ مكتوبة للأسرة؟</p>
<select id="q1">
<option value="0">لا</option>
<option value="1">نعم جزئياً</option>
<option value="2">نعم بالكامل</option>
</select>
</div>

<div class="question">
<p>هل لديك صندوق طوارئ يكفي 72 ساعة؟</p>
<select id="q2">
<option value="0">لا</option>
<option value="1">نعم جزئياً</option>
<option value="2">نعم بالكامل</option>
</select>
</div>

<button onclick="calculate()">احسب النتيجة</button>

<div class="result" id="result"></div>
</div>

<script>
function calculate(){
    let q1 = parseInt(document.getElementById("q1").value);
    let q2 = parseInt(document.getElementById("q2").value);
    let total = q1 + q2;

    let message = "";
    if(total <= 1){
        message = "مستوى الجاهزية منخفض – ينصح بالبدء فوراً بالتجهيز.";
    }else if(total == 2){
        message = "مستوى الجاهزية متوسط – هناك مجال للتحسين.";
    }else{
        message = "مستوى الجاهزية جيد – أحسنت الاستعداد.";
    }

    document.getElementById("result").innerText = message;
}
</script>

</body>
</html>
