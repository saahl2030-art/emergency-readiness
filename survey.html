<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استبيان جاهزية المنزل للطوارئ</title>
<style>
  :root{
    --bg:#070b14;
    --panel:#0d1424;
    --panel2:#0b1220;
    --border:rgba(255,255,255,.08);
    --text:#eaf0ff;
    --muted:rgba(234,240,255,.72);
    --accent:#f59e0b;   /* برتقالي */
    --accent2:#2563eb;  /* أزرق */
    --good:#22c55e;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: Tahoma, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 20% 0%, rgba(37,99,235,.22), transparent 60%),
                radial-gradient(900px 500px at 80% 10%, rgba(245,158,11,.14), transparent 55%),
                var(--bg);
    color:var(--text);
  }

  /* شريط علوي بسيط */
  .topbar{
    position:sticky;
    top:0;
    z-index:5;
    backdrop-filter: blur(10px);
    background: linear-gradient(180deg, rgba(13,20,36,.92), rgba(13,20,36,.72));
    border-bottom:1px solid var(--border);
    padding:14px 18px;
  }
  .topbar .title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    max-width:1100px;
    margin:0 auto;
  }
  .badge{
    font-size:12px;
    color:var(--muted);
    border:1px solid var(--border);
    padding:6px 10px;
    border-radius:999px;
    background: rgba(255,255,255,.03);
  }

  /* أزرار اللغة */
  .langWrap{
    text-align:left;
    padding:14px 18px 0;
    max-width:1100px;
    margin:0 auto;
  }
  .langWrap button{
    background: rgba(255,255,255,.05);
    color:var(--text);
    border:1px solid var(--border);
    padding:8px 12px;
    border-radius:999px;
    cursor:pointer;
    transition:.15s;
    font-weight:700;
  }
  .langWrap button:hover{transform:translateY(-1px); border-color:rgba(245,158,11,.35)}
  .langWrap button.active{
    border-color:rgba(245,158,11,.55);
    box-shadow: 0 0 0 3px rgba(245,158,11,.12);
  }

  /* العداد */
  #visitCounter{
    max-width:1100px;
    margin:10px auto 0;
    padding:0 18px;
    color:var(--muted);
    font-size:13px;
    text-align:left;
  }

  /* تخطيط عام */
  .container{
    max-width:1100px;
    margin:18px auto 28px;
    padding:0 18px;
  }

  h1{
    margin:12px 0 14px;
    font-size:30px;
    letter-spacing:.2px;
  }

  form{
    background: linear-gradient(180deg, rgba(13,20,36,.9), rgba(11,18,32,.9));
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
    box-shadow: 0 18px 40px rgba(0,0,0,.35);
  }

  /* كل سؤال */
  .question{
    background: rgba(255,255,255,.02);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px 14px;
    margin:12px 0;
  }
  .question p{
    margin:0 0 10px;
    font-size:16px;
    color:var(--text);
    font-weight:700;
  }

  /* select */
  select{
    width:100%;
    padding:12px 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.25);
    color:var(--text);
    outline:none;
  }
  select:focus{
    border-color:rgba(245,158,11,.55);
    box-shadow:0 0 0 3px rgba(245,158,11,.12);
  }

  /* زر الحساب */
  button[type="button"], button.calcBtn{
    width:100%;
    margin-top:14px;
    padding:14px 14px;
    border:none;
    border-radius:14px;
    font-weight:800;
    cursor:pointer;
    color:#08101f;
    background: linear-gradient(90deg, var(--accent), #ffd08a);
    transition:.15s;
  }
  button[type="button"]:hover, button.calcBtn:hover{
    transform:translateY(-1px);
    filter:saturate(1.05);
  }

  /* النتيجة */
  .result{
    margin-top:16px;
    display:block;
    background: rgba(255,255,255,.03);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
  }
  .result h3{
    margin:0 0 10px;
    font-size:18px;
  }

  /* شريط التقدم */
  .progress{
    width:100%;
    height:12px;
    background: rgba(255,255,255,.08);
    border-radius:999px;
    overflow:hidden;
    margin:10px 0 12px;
  }
  .progress-bar{
    height:100%;
    width:0%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius:999px;
    transition: width .25s ease;
  }

  /* التوصيات */
  #recommendation{
    color:var(--muted);
    line-height:1.75;
  }
  #recommendation ul{
    margin:10px 0 0;
    padding:0 18px 0 0;
  }
  #recommendation li{
    margin:6px 0;
  }
</style>
</head>
<body>
  <div style="text-align:left; padding:10px;">
  <button onclick="setLanguage('ar')">AR</button>
  <button onclick="setLanguage('en')">EN</button>
</div>
<div id="visitCounter" style="text-align:center; margin:12px 0; font-weight:700;">
  عدد الزيارات: ...
</div>
<div class="container">
<h1>مؤشر الجاهزية للطوارئ</h1>
<p style="color:rgba(234,240,255,.72);margin-top:-6px;font-size:14px;">
قياس دقيق لمدى استعدادك وأسرتك للتعامل مع الحالات الطارئة.
</p>

<form id="surveyForm">

<div id="questions"></div>

<button type="button" onclick="calculate()">احسب النتيجة</button>

<div class="result" id="result" style="display:none;">
<h3 id="scoreText"></h3>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<p id="recommendation"></p>
</div>

</form>
</div>

<script>
const questionsData = [
"هل لديك خطة طوارئ مكتوبة للأسرة؟",
"هل يعرف جميع أفراد الأسرة أدوارهم وقت الطوارئ؟",
"هل لديكم نقطة تجمع محددة خارج المنزل؟",
"هل لديكم أرقام الطوارئ محفوظة؟",
"هل لديكم وسيلة اتصال بديلة عند انقطاع الشبكة؟",
"هل لديك صندوق طوارئ يكفي 72 ساعة؟",
"هل يتوفر ماء كافٍ لكل فرد لمدة 72 ساعة؟",
"هل لديك مواد غذائية غير قابلة للتلف؟",
"هل توجد حقيبة إسعافات أولية مكتملة؟",
"هل لديك مصابيح وبطاريات احتياطية؟",
"هل لديك كاشف دخان يعمل؟",
"هل لديك طفاية حريق صالحة؟",
"هل تعرف كيفية فصل الغاز والكهرباء؟",
"هل تحتفظ بنسخ رقمية من الوثائق المهمة؟"
];

const options = [
{value:0,text:"غير متوفر"},
{value:1,text:"ضعيف"},
{value:2,text:"متوسط"},
{value:3,text:"جيد"},
{value:4,text:"ممتاز"}
];

const questionsContainer = document.getElementById("questions");

questionsData.forEach((q,index)=>{
let div=document.createElement("div");
div.className="question";
let html=`<h3>${index+1}. ${q}</h3><select id="q${index}">`;
options.forEach(o=>{html+=`<option value="${o.value}">${o.text}</option>`});
html+=`</select>`;
div.innerHTML=html;
questionsContainer.appendChild(div);
});

function calculate(){
let total=0;
for(let i=0;i<questionsData.length;i++){
total+=parseInt(document.getElementById("q"+i).value);
}

let maxScore=questionsData.length*4;
let percent=Math.round((total/maxScore)*100);

let level="";
let recommendation="";

if(percent<40){
level="مستوى الجاهزية منخفض";
recommendation="ابدأ بوضع خطة مكتوبة وتجهيز أساسيات 72 ساعة فوراً.";
}else if(percent<75){
level="مستوى الجاهزية متوسط";
recommendation="أنت على الطريق الصحيح، لكن تحتاج إلى تحسين بعض الجوانب.";
}else{
level="مستوى الجاهزية مرتفع";
recommendation="ممتاز! حافظ على تحديث خطتك وتجهيزاتك بانتظام.";
}

document.getElementById("result").style.display="block";
document.getElementById("scoreText").innerText=level+" ("+percent+"%)";
let tips = [];

if (percent < 40) {
  tips = [
    "اكتب خطة طوارئ واضحة ومحدثة للأسرة.",
    "جهّز حقيبة طوارئ تكفي 72 ساعة لكل فرد.",
    "تأكد من وجود حقيبة إسعافات أولية مكتملة.",
    "افحص صلاحية كاشف الدخان وطفاية الحريق.",
    "حدد وسيلة تواصل بديلة عند انقطاع الشبكة."
  ];
} else if (percent < 75) {
  tips = [
    "حدّث خطة الطوارئ وحدد أدوار كل فرد.",
    "راجع مخزون الماء والطعام كل 3 أشهر.",
    "احتفظ بنسخ رقمية من الوثائق المهمة.",
    "تأكد من شحن المصابيح والبطاريات الاحتياطية.",
    "جرّب تدريبًا منزليًا لمحاكاة الطوارئ."
  ];
} else {
  tips = [
    "ممتاز، حافظ على تحديث خطة الطوارئ بانتظام.",
    "افحص صلاحية التجهيزات كل فترة.",
    "راجع خطتك مع الأسرة مرتين سنويًا."
  ];
}

document.getElementById("recommendation").innerHTML =
  `<div style="font-weight:bold;margin-bottom:8px;">${recommendation}</div>
   <div style="margin-top:10px;font-weight:bold;">توصيات عملية:</div>
   <ul style="margin-top:8px;line-height:1.9;">
     ${tips.map(t => `<li>${t}</li>`).join("")}
   </ul>`;
document.getElementById("progressBar").style.width=percent+"%";
}
</script>
<script>
const namespace = "emergency-readiness-uae";
const key = "survey-visits";

if (!localStorage.getItem("visited")) {
  fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`)
    .then(res => res.json())
    .then(res => {
      document.getElementById("visitCounter").innerText =
        "عدد الزيارات: " + res.value;
      localStorage.setItem("visited", "true");
    });
} else {
  fetch(`https://api.countapi.xyz/get/${namespace}/${key}`)
    .then(res => res.json())
    .then(res => {
      document.getElementById("visitCounter").innerText =
        "عدد الزيارات: " + res.value;
    });
}
</script>
<script>
function setLanguage(lang) {

  if (lang === "en") {
    document.documentElement.lang = "en";
    document.documentElement.dir = "ltr";

    document.querySelector("h1").innerText =
      "Emergency Home Preparedness Survey";

    document.getElementById("visitCounter").innerText =
      "Total Visits: " + document.getElementById("visitCounter").innerText.replace("عدد الزيارات: ", "");

  } else {
    document.documentElement.lang = "ar";
    document.documentElement.dir = "rtl";

    document.querySelector("h1").innerText =
      "استبيان جاهزية المنزل للطوارئ";

    document.getElementById("visitCounter").innerText =
      "عدد الزيارات: " + document.getElementById("visitCounter").innerText.replace("Total Visits: ", "");
  }
}
</script>  
</body>
</html>
